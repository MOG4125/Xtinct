<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTINCT | Interactive Console</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #ff0000; display: flex; 
            justify-content: center; align-items: center; z-index: 100; 
            letter-spacing: 5px; font-weight: 900; 
        }
        #hint {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 2px;
            pointer-events: none; text-transform: uppercase; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading">XTINCT // INITIALIZING SYSTEM...</div>
    <div id="hint">Click Pads for Socials // Drag to Rotate</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
