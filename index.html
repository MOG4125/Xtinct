<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTINCT | Virtual CDJ-3000</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; cursor: default; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #ff0000; letter-spacing: 4px; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 2px solid #222; border-top: 2px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #ui-overlay { position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.5); font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>INITIALIZING XTINCT GEAR</div>
    </div>
    <div id="ui-overlay">ORBIT: DRAG | ZOOM: SCROLL | INTERACT: CLICK</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration & State ---
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const interactiveObjects = [];
        
        const state = {
            deck1: { playing: false, rotationSpeed: 0, bpm: 128.0, hue: 0 },
            deck2: { playing: false, rotationSpeed: 0, bpm: 124.5, hue: 0 }
        };

        const socialLinks = {
            instagram: 'https://instagram.com/xtinct',
            youtube: 'https://youtube.com/xtinct',
            tiktok: 'https://tiktok.com/@xtinct',
            soundcloud: 'https://soundcloud.com/xtinct'
        };

        // --- Texture Generators ---
        function createVinylTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Base black
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, 1024, 1024);
            
            // Grooves
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for(let i = 0; i < 512; i += 2) {
                ctx.beginPath();
                ctx.arc(512, 512, i, 0, Math.PI * 2);
                ctx.stroke();
            }

            // XTINCT Center Label
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(512, 512, 200, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('XTINCT', 512, 535);

            return new THREE.CanvasTexture(canvas);
        }

        function createScreenTexture(deckId) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const texture = new THREE.CanvasTexture(canvas);
            
            const update = (time) => {
                ctx.fillStyle = '#050505';
                ctx.fillRect(0, 0, 512, 256);
                
                // Waveform
                ctx.strokeStyle = deckId === 1 ? '#00ffff' : '#ff00ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for(let x = 0; x < 512; x++) {
                    const y = 128 + Math.sin(x * 0.05 + time * 10) * 40 * Math.random();
                    if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // BPM
                ctx.fillStyle = '#ffffff';
                ctx.font = '40px Monospace';
                ctx.fillText(state[`deck${deckId}`].bpm.toFixed(1), 20, 50);
                ctx.font = '20px Monospace';
                ctx.fillText('BPM', 150, 50);
                
                texture.needsUpdate = true;
            };

            return { texture, update };
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.15);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1;

        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambient);

        const frontLight = new THREE.DirectionalLight(0xffffff, 1);
        frontLight.position.set(0, 10, 10);
        frontLight.castShadow = true;
        scene.add(frontLight);

        const topLight = new THREE.PointLight(0xffffff, 0.5);
        topLight.position.set(0, 5, 0);
        scene.add(topLight);

        const redRim = new THREE.SpotLight(0xff0000, 5, 20, 0.5);
        redRim.position.set(-10, 5, -5);
        scene.add(redRim);

        const blueSpot = new THREE.SpotLight(0x0000ff, 5, 20, 0.5);
        blueSpot.position.set(10, 5, -5);
        scene.add(blueSpot);

        // X-Spotlights
        const xLights = [];
        const xCoords = [[-5, 5], [5, 5], [-5, -5], [5, -5]];
        xCoords.forEach(coord => {
            const light = new THREE.SpotLight(0xffffff, 0, 30, 0.2);
            light.position.set(coord[0], 15, coord[1]);
            light.target.position.set(0, 0, 0);
            scene.add(light);
            scene.add(light.target);
            xLights.push(light);
        });

        // --- Materials ---
        const chassisMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 });
        const plasticMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });
        const chromeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1, roughness: 0.1 });
        const rubberMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9 });
        
        // --- Geometry Creation ---
        function createDeck(id, posX) {
            const group = new THREE.Group();
            group.position.x = posX;
            
            // Main Chassis
            const body = new THREE.Mesh(new THREE.BoxGeometry(6, 0.8, 8), chassisMat);
            body.receiveShadow = true;
            group.add(body);

            // Jog Wheel
            const jogGroup = new THREE.Group();
            jogGroup.position.y = 0.5;
            jogGroup.position.z = 1;
            
            const platter = new THREE.Mesh(
                new THREE.CylinderGeometry(2.5, 2.5, 0.3, 64),
                new THREE.MeshStandardMaterial({ map: createVinylTexture(), metalness: 0.5, roughness: 0.4 })
            );
            jogGroup.add(platter);

            const spindle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5, 16), chromeMat);
            spindle.position.y = 0.2;
            jogGroup.add(spindle);

            const ringGeo = new THREE.RingGeometry(2.55, 2.65, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0 });
            const ledRing = new THREE.Mesh(ringGeo, ringMat);
            ledRing.rotation.x = -Math.PI / 2;
            ledRing.position.y = -0.1;
            jogGroup.add(ledRing);
            
            group.add(jogGroup);

            // Buttons
            const btnGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.15, 32);
            
            // PLAY
            const playBtn = new THREE.Mesh(btnGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
            playBtn.position.set(-2, 0.45, 3);
            playBtn.userData = { type: 'play', deck: id };
            const playLed = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.02, 8, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.2 }));
            playLed.rotation.x = Math.PI/2;
            playBtn.add(playLed);
            group.add(playBtn);
            interactiveObjects.push(playBtn);

            // CUE
            const cueBtn = new THREE.Mesh(btnGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
            cueBtn.position.set(-1, 0.45, 3);
            cueBtn.userData = { type: 'cue', deck: id };
            const cueLed = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.02, 8, 32), new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.2 }));
            cueLed.rotation.x = Math.PI/2;
            cueBtn.add(cueLed);
            group.add(cueBtn);
            interactiveObjects.push(cueBtn);

            // Tempo Slider
            const sliderTrack = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 3), plasticMat);
            sliderTrack.position.set(2.5, 0.41, 0);
            group.add(sliderTrack);
            
            const knob = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.2), chromeMat);
            knob.position.set(2.5, 0.5, 0);
            group.add(knob);

            // Display
            const screenData = createScreenTexture(id);
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 1.8),
                new THREE.MeshBasicMaterial({ map: screenData.texture })
            );
            screen.position.set(0, 0.8, -2.5);
            screen.rotation.x = -Math.PI / 4;
            group.add(screen);

            scene.add(group);
            return { group, jogGroup, ledRing, playLed, cueLed, screenUpdate: screenData.update };
        }

        const deck1 = createDeck(1, -3.5);
        const deck2 = createDeck(2, 3.5);

        // Performance Pads
        const padColors = [0xbc2a8d, 0xff0000, 0x00f2ea, 0xff8800, 0xffcc00, 0x0088ff];
        const padActions = ['instagram', 'youtube', 'tiktok', 'soundcloud', '', ''];
        
        for(let i = 0; i < 6; i++) {
            const row = Math.floor(i / 3);
            const col = i % 3;
            const pad = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.8), rubberMat);
            pad.position.set((col - 1) * 1, 0.4, 5 + (row * 1));
            
            const led = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({ color: padColors[i] }));
            led.position.set(0.3, 0.11, -0.3);
            pad.add(led);
            
            pad.userData = { type: 'pad', action: padActions[i], color: padColors[i] };
            scene.add(pad);
            interactiveObjects.push(pad);
        }

        // --- Environment ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.5 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.4;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(100, 50, 0x220000, 0x111111);
        grid.position.y = -0.39;
        scene.add(grid);

        // Particles
        const partGeo = new THREE.BufferGeometry();
        const partCount = 500;
        const pos = new Float32Array(partCount * 3);
        for(let i = 0; i < partCount * 3; i++) pos[i] = (Math.random() - 0.5) * 20;
        partGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ color: 0xff0000, size: 0.05, transparent: true, opacity: 0.5 }));
        scene.add(particles);

        // --- Interaction Logic ---
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(interactiveObjects);
            if(intersects.length > 0) {
                const obj = intersects[0].object;
                const data = obj.userData;
                
                // Button Press Animation
                obj.position.y -= 0.05;
                setTimeout(() => obj.position.y += 0.05, 100);

                if(data.type === 'play') {
                    const s = state[`deck${data.deck}`];
                    s.playing = !s.playing;
                } else if(data.type === 'cue') {
                    // Stutter effect
                    state[`deck${data.deck}`].rotationSpeed += 0.5;
                } else if(data.type === 'pad' && data.action) {
                    window.open(socialLinks[data.action], '_blank');
                }
            }
        });

        // --- Animation Loop ---
        function animate() {
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Deck Logic
            [deck1, deck2].forEach((d, i) => {
                const s = state[`deck${i+1}`];
                const targetSpeed = s.playing ? 0.05 : 0;
                s.rotationSpeed = THREE.MathUtils.lerp(s.rotationSpeed, targetSpeed, delta * 2);
                
                d.jogGroup.rotation.y += s.rotationSpeed;
                d.ledRing.material.opacity = s.playing ? (0.5 + Math.sin(time * 10) * 0.5) : 0;
                d.playLed.material.opacity = s.playing ? 1.0 : 0.2;
                
                d.screenUpdate(time);
            });

            // X-Lights Glitch
            xLights.forEach(l => {
                if(Math.random() > 0.98) {
                    l.intensity = 20;
                    l.position.x += (Math.random() - 0.5);
                } else {
                    l.intensity = THREE.MathUtils.lerp(l.intensity, 0, delta * 5);
                }
            });

            // Particles float
            particles.rotation.y += delta * 0.05;
            particles.position.y = Math.sin(time * 0.5) * 0.2;

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // Initialization
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 500);
            animate();
        }, 1500);

    </script>
</body>
</html>
