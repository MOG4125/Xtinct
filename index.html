<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTINCT | Studio Station</title>
    <style>
        body { margin: 0; background: #f0f0f0; overflow: hidden; font-family: 'Inter', sans-serif; }
        #labels { 
            position: fixed; top: 30px; width: 100%; text-align: center; 
            color: #ff0000; letter-spacing: 8px; font-weight: 900; 
            pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div id="labels">XTINCT // STUDIO</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfafafa);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 14, 0); // High vantage point to see everything
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Studio Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
        topLight.position.set(0, 20, 5);
        topLight.castShadow = true;
        scene.add(topLight);

        // Subtle Red "X" Accents
        const x1 = new THREE.PointLight(0xff0000, 15);
        x1.position.set(-8, 5, -8);
        scene.add(x1);

        const x2 = new THREE.PointLight(0xff0000, 15);
        x2.position.set(8, 5, 8);
        scene.add(x2);

        // --- Materials ---
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.1 });
        const platterMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4, metalness: 0.8 });
        const accentMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        // --- Deck Builder ---
        function createDeck(x) {
            const group = new THREE.Group();
            group.position.x = x;

            // Chassis
            const body = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.6, 6.5), bodyMat);
            body.receiveShadow = true;
            body.castShadow = true;
            group.add(body);

            // Platter
            const platter = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 1.9, 0.2, 64), platterMat);
            platter.position.y = 0.4;
            group.add(platter);

            // XTINCT Center Label
            const label = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.21, 32), accentMat);
            label.position.y = 0.41;
            group.add(label);

            // Controls
            const playBtn = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 32), new THREE.MeshStandardMaterial({color: 0x00ff88}));
            playBtn.position.set(-1.6, 0.35, 2.4);
            playBtn.userData = { type: 'play', deckId: x < 0 ? 1 : 2 };
            group.add(playBtn);

            scene.add(group);
            return { group, platter, playing: false };
        }

        const deck1 = createDeck(-2.8);
        const deck2 = createDeck(2.8);

        // --- Minimal Floor ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0xf0f0f0 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.31;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Social Pads ---
        const platforms = ['INSTA', 'YT', 'TIKTOK', 'SC'];
        const urls = [
            'https://instagram.com/xtinct',
            'https://youtube.com/xtinct',
            'https://tiktok.com/@xtinct',
            'https://soundcloud.com/xtinct'
        ];

        urls.forEach((url, i) => {
            const pad = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.15, 0.8), bodyMat);
            pad.position.set((i - 1.5) * 1.3, 0, 4.8);
            pad.userData = { type: 'pad', url };
            scene.add(pad);
        });

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const hits = raycaster.intersectObjects(scene.children, true);
            if (hits.length > 0) {
                const obj = hits[0].object;
                if (obj.userData.type === 'play') {
                    const d = obj.userData.deckId === 1 ? deck1 : deck2;
                    d.playing = !d.playing;
                    obj.position.y -= 0.1;
                    setTimeout(() => obj.position.y += 0.1, 100);
                } else if (obj.userData.type === 'pad') {
                    window.open(obj.userData.url, '_blank');
                }
            }
        });

        // --- Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (deck1.playing) deck1.platter.rotation.y += 0.05;
            if (deck2.playing) deck2.platter.rotation.y += 0.05;
            
            // Subtle breathing of the "X" lights
            const intensity = 10 + Math.sin(Date.now() * 0.002) * 5;
            x1.intensity = intensity;
            x2.intensity = intensity;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
