<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTINCT | Digital Station</title>
    <style>
        :root {
            --red: #ff0000;
            --cyan: #00f2ea;
            --bg: #050505;
            --panel: #111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* X-Light Background Effect */
        .x-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(255,0,0,0.05) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(255,0,0,0.05) 50%, transparent 52%);
            background-size: 100% 100%;
            z-index: 0;
        }

        .station-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 90%;
            max-width: 1000px;
        }

        .deck {
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Spinning Platter */
        .platter {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, #111, #111 2px, #1a1a1a 3px);
            border: 8px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 1s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .platter.playing {
            animation: spin 1.8s linear infinite;
        }

        .platter::after {
            content: 'XTINCT';
            color: var(--red);
            font-weight: 900;
            font-size: 14px;
            background: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #222;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .btn:active { transform: scale(0.9); }
        .btn.play.active { border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        .btn.cue:active { border-color: var(--red); box-shadow: 0 0 15px var(--red); }

        /* Pads */
        .pads {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .pad {
            width: 80px;
            height: 50px;
            background: #151515;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #444;
            transition: 0.3s;
            border-bottom: 3px solid #000;
        }

        .pad:hover { color: #fff; background: #222; }
        .pad.insta:hover { border-bottom-color: #e1306c; }
        .pad.yt:hover { border-bottom-color: #ff0000; }
        .pad.tk:hover { border-bottom-color: var(--cyan); }

        .logo {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 40px;
            color: var(--red);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="x-lights"></div>
    
    <div class="logo">XTINCT // PERFORMANCE</div>

    <div class="station-container">
        <!-- Deck 1 -->
        <div class="deck">
            <div class="platter" id="platter1"></div>
            <div class="controls">
                <button class="btn play" onclick="toggleDeck(1, this)">PLAY</button>
                <button class="btn cue" onmousedown="stutter(1)">CUE</button>
            </div>
        </div>

        <!-- Deck 2 -->
        <div class="deck">
            <div class="platter" id="platter2"></div>
            <div class="controls">
                <button class="btn play" onclick="toggleDeck(2, this)">PLAY</button>
                <button class="btn cue" onmousedown="stutter(2)">CUE</button>
            </div>
        </div>

        <!-- Social Pads -->
        <div class="pads">
            <div class="pad insta" onclick="nav('instagram')">INSTA</div>
            <div class="pad yt" onclick="nav('youtube')">YOUTUBE</div>
            <div class="pad tk" onclick="nav('tiktok')">TIKTOK</div>
            <div class="pad sc" onclick="nav('soundcloud')">SOUNDCLOUD</div>
        </div>
    </div>

    <script>
        function toggleDeck(id, btn) {
            const platter = document.getElementById(`platter${id}`);
            const isPlaying = platter.classList.toggle('playing');
            btn.classList.toggle('active', isPlaying);
        }

        function stutter(id) {
            const platter = document.getElementById(`platter${id}`);
            platter.style.transition = 'none';
            platter.style.transform = `rotate(${Math.random() * 360}deg)`;
            setTimeout(() => {
                platter.style.transition = 'transform 1s cubic-bezier(0.2, 0, 0.2, 1)';
            }, 10);
        }

        function nav(platform) {
            const links = {
                instagram: 'https://instagram.com/xtinct',
                youtube: 'https://youtube.com/xtinct',
                tiktok: 'https://tiktok.com/@xtinct',
                soundcloud: 'https://soundcloud.com/xtinct'
            };
            window.open(links[platform], '_blank');
        }
    </script>
</body>
</html>
