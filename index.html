<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTINCT | 3D Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #ff0000; pointer-events: none; letter-spacing: 3px; font-weight: 900; }
        #hint { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #444; font-size: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="ui">XTINCT // LIVE</div>
    <div id="hint">MOUSE WHEEL: ZOOM | LEFT CLICK: ROTATE | RIGHT CLICK: PAN</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.1);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Navigation ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2; // Don't go below floor
        controls.minDistance = 5;
        controls.maxDistance = 25;

        // --- Lighting ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambient);

        const spotlight = new THREE.SpotLight(0xff0000, 100);
        spotlight.position.set(0, 15, 0);
        spotlight.angle = Math.PI / 4;
        spotlight.penumbra = 0.5;
        scene.add(spotlight);

        // Side glow for the "X" feel
        const blueGlow = new THREE.PointLight(0x00f2ea, 20, 15);
        blueGlow.position.set(10, 2, -5);
        scene.add(blueGlow);

        const redGlow = new THREE.PointLight(0xff0000, 20, 15);
        redGlow.position.set(-10, 2, -5);
        scene.add(redGlow);

        // --- Geometry & Materials ---
        const chassisMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.2, metalness: 0.5 });
        const platterMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.3 });
        const neonMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        const decks = [];

        function createDeck(xPos) {
            const group = new THREE.Group();
            group.position.x = xPos;

            // Main Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(5, 0.6, 7), chassisMat);
            group.add(body);

            // Spinning Platter
            const platterGroup = new THREE.Group();
            platterGroup.position.y = 0.35;
            
            const platter = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.15, 64), platterMat);
            platterGroup.add(platter);

            // Center Label
            const label = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.16, 32), neonMat);
            platterGroup.add(label);

            group.add(platterGroup);

            // Emissive Details (Buttons)
            const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16), new THREE.MeshBasicMaterial({ color: 0x00f2ea }));
            btn.position.set(-1.8, 0.3, 2.5);
            group.add(btn);

            scene.add(group);
            decks.push({ group, platterGroup });
        }

        createDeck(-3);
        createDeck(3);

        // --- Environment ---
        const grid = new THREE.GridHelper(100, 40, 0x111111, 0x050505);
        grid.position.y = -0.3;
        scene.add(grid);

        // --- Interactive Pads (Socials) ---
        const socialLinks = [
            { name: 'INSTA', url: 'https://instagram.com/xtinct', color: 0xff0000 },
            { name: 'YT', url: 'https://youtube.com/xtinct', color: 0xffffff },
            { name: 'TIKTOK', url: 'https://tiktok.com/@xtinct', color: 0x00f2ea }
        ];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        socialLinks.forEach((link, i) => {
            const pad = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.1, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x222222, emissive: link.color, emissiveIntensity: 0.2 })
            );
            pad.position.set((i - 1) * 1.5, 0, 5);
            pad.userData = { url: link.url };
            scene.add(pad);
        });

        // --- Event Listeners ---
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object.userData.url) {
                window.open(hits[0].object.userData.url, '_blank');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // Keep wheels moving
            decks.forEach((deck, i) => {
                deck.platterGroup.rotation.y += 0.04;
                // Subtle bounce
                deck.group.position.y = Math.sin(time + i) * 0.05;
            });

            // Pulse lights
            spotlight.intensity = 80 + Math.sin(time * 4) * 20;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
